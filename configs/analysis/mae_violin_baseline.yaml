# MAE violin plot configuration.
# Run on the cluster with:
#   sbatch scripts/cluster/analysis/plot_mae_violins.sbatch

evaluation:
  # "stay" matches the stay-level aggregation used by evaluate_with_detailed_metrics:
  # mean predictions per stay_id, then abs(prediction - true LOS).
  # Use "ecg" if you want one error per ECG window instead.
  error_level: "stay"
  batch_size: 64
  num_workers: 4
  device: "cuda"

plot:
  # Clean figure: no title unless show_title is true and title is set.
  show_title: false
  title: null
  ylabel: "Absolute error (days)"
  color: "#8AD185"
  max_plots: 7
  show_mean_marker: true
  annotate_mae_decimals: 2
  # value_only = mean only (e.g. 2.31); mae = "MAE 2.31"
  annotate_format: "value_only"
  rotation: 22

output:
  pdf_path: "outputs/results/models/violin/models_baseline_mae.pdf"
  summary_csv_path: "outputs/results/models/violin/models_baseline_mae_summary.csv"
  # Set to a CSV path if you want all per-sample errors saved too.
  errors_csv_path: null

jobs:
  # For PyTorch models, checkpoint discovery uses outputs/checkpoints/*_best_<job_id>.pt.
  # For XGBoost, set model_type: xgboost. The default path is
  # outputs/checkpoints/xgboost_los_best_<job_id>.pkl.
  - enabled: true
    architecture: "XGBoost"
    model_type: "xgboost"
    job_id: "4644575"
    plot_label: "XGBoost"
    config_path: "configs/classical_ml/xgboost_handcrafted.yaml"

  - enabled: true
    architecture: "CNNScratch"
    job_id: "4644576"
    plot_label: "CNN (scratch)"

  - enabled: true
    architecture: "LSTM1D_Unidirectional"
    job_id: "4654867"
    plot_label: "LSTM (uni)"

  - enabled: true
    architecture: "LSTM1D_Bidirectional"
    job_id: "4644578"
    plot_label: "LSTM (bi)"

  - enabled: true
    architecture: "HybridCNNLSTM"
    job_id: "4654748"
    plot_label: "Hybrid CNN-LSTM"

  - enabled: true
    architecture: "DeepECG_SL"
    job_id: "4644579"
    plot_label: "DeepECG-SL"

  - enabled: true
    architecture: "HuBERT_ECG"
    job_id: "4647404"
    plot_label: "HuBERT-ECG"
