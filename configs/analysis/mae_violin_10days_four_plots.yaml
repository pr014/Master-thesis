        job_id: "4654867"
        plot_label: "LSTM (uni)"
      - enabled: true
        architecture: "LSTM1D_Bidirectional"
        job_id: "4644578"
        plot_label: "LSTM (bi)"
      - enabled: true
        architecture: "HybridCNNLSTM"
        job_id: "4654748"
