# D5: full EHR window + ICU + demographics
data:
  demographic_features:
    enabled: true
  icu_unit_features:
    enabled: true
  ehr_window_features:
    enabled: true
    csv_path: "data/labeling/labels_csv/EHR_feature_data.csv"
    exclude_columns:
      - "base_path"
      - "study_id"
      - "subject_id"
      - "ecg_time"
      - "stay_id"
      - "stay_intime"
      - "hadm_id"
      - "t_cut"
    normalize: "zscore"
