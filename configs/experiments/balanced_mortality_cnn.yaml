# Isolated experiment: CNNScratch binary mortality on balanced_mortality + manifest.csv
# Only used by scripts/training/icu_24h/balanced_mortality_cnn/train_balanced_mortality_cnn.py

seed: 42

device:
  device: null
  deterministic: false

# Top-level num_classes required by BaseECGModel for classification
num_classes: 2

data:
  task_type: "classification"
  data_dir: "data/icu_ecgs_24h/balanced_mortality"
  manifest_path: "data/icu_ecgs_24h/balanced_mortality/manifest.csv"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12
  # All four ECGAugmentation transforms (same defaults as create_augmentation_transform)
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: true
    scale_min: 0.85
    scale_max: 1.15
    baseline_wander: true
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    lead_dropout: true
    lead_dropout_prob: 0.1
  demographic_features:
    enabled: false
  icu_unit_features:
    enabled: false

model:
  type: "CNNScratch"
  num_classes: 2

training:
  batch_size: 64
  num_epochs: 50
  num_workers: 4
  pin_memory: true
  optimizer:
    type: "Adam"
    lr: 5.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
  gradient_clip_norm: 1.0
  dropout_rate: 0.3
  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.1
    patience: 5
    min_lr: 1.0e-6
  loss:
    type: "cross_entropy"

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

early_stopping:
  enabled: true
  patience: 7
  monitor: "val_auc"
  mode: "max"

checkpoint:
  save_dir: "outputs/checkpoints/balanced_mortality_cnn"
  save_best: true
  metric: "val_auc"

logging:
  log_prefix: "[balanced_mortality_cnn]"
