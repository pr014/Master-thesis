# DeepECG-SL experiment overlay: best HPO trial from LR-aware study (deepecg_sl_hpo_lr_20260402, trial 9).
# Source trial YAML: outputs/tuning/deepecg_sl/2026-04-02/deepecg_sl_hpo_lr_20260402/trial_configs/trial_0009.yaml
# Merge on top of configs/model/deepecg_sl/deepecg_sl.yaml via:
#   python scripts/training/icu_24h/deepecg_sl/train_deepecg_sl_24h.py \
#     --experiment-config configs/tuning/deepecg_sl/best_HP_deepecgsl.yaml
#
# Tuning 2 ran tabular features OFF; this overlay turns ON demographics, ICU unit, and SOFA (paths stay from base model YAML).
# Phase 2: set backbone_lr / head_lr (required for this study; legacy 1e-5 / 1e-4 applies only if both are omitted).

data:
  data_dir: "data/icu_ecgs_24h/P1"

  demographic_features:
    enabled: true

  icu_unit_features:
    enabled: true

  sofa_features:
    enabled: true

  diagnosis_features:
    enabled: false

  augmentation:
    enabled: true
    gaussian_noise: true
    lead_dropout: true
    baseline_wander: true
    amplitude_scaling: false
    noise_std: 0.05691542801995355
    lead_dropout_prob: 0.09744051665074756
    bw_freq_min: 0.15622884942645449
    bw_freq_max: 0.3701245833807417
    bw_amp_min: 0.0323318045021362
    bw_amp_max: 0.10991201748576716

training:
  batch_size: 16
  dropout_rate: 0.2108586571226807
  gradient_clip_norm: 2.0

  optimizer:
    type: "AdamW"
    lr: 0.0008730843474854978
    backbone_lr: 9.397993517811034e-05
    head_lr: 0.0008730843474854978
    weight_decay: 1.9469051078395197e-06
    betas: [0.9, 0.98]

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.1
    patience: 3
    min_lr: 1.0e-06

  loss:
    type: "huber"
    delta: 0.9365906149582586
    weighted: false
