# Optuna base for DeepECG-SL with tabular features (P1 cohort).
# Merge order: configs/model/deepecg_sl/deepecg_sl.yaml + this file + trial overrides from the worker.
#
# Use --base-tuning-yaml configs/tuning/deepecg_sl/optuna_base_p1_tabular.yaml (default in worker).
# For ECG-only HPO use optuna_base_p1_no_tabular.yaml instead.
#
# SOFA: inherits filter_to_valid_sofa from model YAML when enabled (typically true).

data:
  data_dir: "data/icu_ecgs_24h/P1"

  demographic_features:
    enabled: true

  icu_unit_features:
    enabled: true

  sofa_features:
    enabled: true

  augmentation:
    enabled: true
    gaussian_noise: true
    lead_dropout: true
    baseline_wander: true
    amplitude_scaling: false
