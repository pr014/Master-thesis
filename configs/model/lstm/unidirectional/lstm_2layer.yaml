# LSTM1D Unidirectional (2-Layer) — Studienzeile A3 (unidir. LSTM, 2 Schichten)
# Enthält alle Parameter: Daten, Preprocessing, Augmentation, Training, Modell
# Pure LSTM architecture (no CNN) with improvements: 2-layer, mean pooling, embedding
#
# Gemeinsam mit allen Architekturen: P1, D1, AG1 | H3: wie Uni LSTM (2 Schichten)
# - P1 / D1 / AG1: wie lstm_1layer.yaml
# - H3: lr 3e-4, Batch 128, wd 2e-4, lstm_dropout 0.4, dropout_rate 0.4, grad_clip 1,
#   ReduceLROnPlateau (factor 0.5, patience 5, min_lr 1e-6), ES patience 12,
#   hidden_dim 128, hidden_dim_layer2 128, embedding_dim 64, betas [0.9, 0.999], LOS-Loss MSE
# Mortalität Test: f1_optimal (Val-max-F1 auf Test), siehe training_utils

seed: 42

device:
  device: null
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12
  
  los_task: "regression"
  split_strategy: "temporal_stratified"
  
  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"
  
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    lead_dropout: false
    lead_dropout_prob: 0.1
    baseline_wander: false
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    time_segment_shuffle: false
    time_segment_shuffle_num_segments: 5
    time_segment_shuffle_p: 0.5
    mortality_balance_time_shuffle:
      enabled: false

  demographic_features:
    enabled: false
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"

  icu_unit_features:
    enabled: false
    encoding: "onehot"
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: false
    normalize: "none"

  icu_therapy_support_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/icu_therapy_support.csv"
    columns:
      - mech_vent
      - niv_hfnc
      - vaso_any
      - vaso_non_catechol_any
      - rrt
    filter_to_labeled_only: true

  ehr_window_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/EHR_feature_data.csv"
    exclude_columns:
      - "base_path"
      - "study_id"
      - "subject_id"
      - "ecg_time"
      - "stay_id"
      - "stay_intime"
      - "hadm_id"
      - "t_cut"
    normalize: "zscore"

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "LSTM1D"  # Alias for LSTM1D_Unidirectional
  num_classes: 10
  
  # LSTM-specific architecture parameters
  # Architecture: 2-Layer Unidirectional LSTM for ECG time series classification/regression
  # Layer 1: 128, Layer 2: 128 (equal-size stacked LSTM)
  # ~205K params (LSTM core) + head (depends on demographics)
  
  hidden_dim: 128  # H3
  hidden_dim_layer2: 128  # H3
  num_layers: 2
  lstm_dropout: 0.4  # H3
  bidirectional: false
  pooling: "mean"
  use_embedding: true
  embedding_dim: 64

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  batch_size: 128  # H3
  num_epochs: 50
  num_workers: 4
  pin_memory: true

  optimizer:
    type: "Adam"
    lr: 3.0e-4  # H3
    weight_decay: 2.0e-4  # H3
    betas: [0.9, 0.999]  # H3

  gradient_clip_norm: 1.0  # H3
  dropout_rate: 0.4  # H3

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5  # H3
    patience: 5  # H3
    min_lr: 1.0e-6  # H3

  loss:
    type: "mse"  # H3

# =============================================================================
# VALIDATION & TEST SETTINGS
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING
# =============================================================================

early_stopping:
  enabled: true
  patience: 12  # H3
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"
  # Val-max-F1 auf Validierung, auf Test (siehe training_utils).
  mortality_test_threshold_mode: f1_optimal

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
