# LSTM1D Bidirectional (1-Layer) — Studienzeile A4 (bidirect. LSTM)
# Enthält alle Parameter: Daten, Preprocessing, Augmentation, Training, Modell
# Improved architecture with mean pooling, embedding, and dropout
#
# Gemeinsam mit allen Architekturen: P1, D1, AG1 | H3: Studientabelle „BI-LSTM“
# - P1: data/icu_ecgs_24h/P1 + Bandpass/Z-score
# - D1: ECG-only — keine Demographics-/ICU-Unit-/SOFA-/Therapie-/EHR-Features
# - AG1: nur Gauß-Rauschen (noise_std 0.03)
# - H3: lr 2e-4, Batch 128, wd 2e-4, lstm_dropout 0.4, dropout_rate 0.4, grad_clip 1,
#   ReduceLROnPlateau (factor 0.5, patience 10, min_lr 1e-6), ES patience 12,
#   hidden_dim 128, embedding_dim 128, betas [0.9, 0.999], LOS-Loss MSE
# - Mortalität Test: fixed_0_5 (Schwelle 0.5 auf Test, kein Val-max-F1)

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

seed: 42

device:
  device: null
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12
  
  los_task: "regression"
  split_strategy: "temporal_stratified"
  
  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"
  
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    # AG1: nur Gauß-Rauschen (kein Amplitude Scaling)
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
  
  demographic_features:
    enabled: false
  
  icu_unit_features:
    enabled: false

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "LSTM1D_Bidirectional"
  num_classes: 10
  
  # LSTM-specific architecture parameters
  # Architecture: Bidirectional LSTM for ECG time series classification/regression
  # Hidden dimension: 128 per direction → 256 total
  # ~300K parameters (1 layer) - ~1.3x unidirectional (232K for 2-layer)
  
  hidden_dim: 128  # H3
  num_layers: 1
  lstm_dropout: 0.4  # H3
  bidirectional: true

  # Pooling Strategy
  pooling: "mean"

  # Embedding Layer (ENABLED)
  use_embedding: true
  embedding_dim: 128  # H3

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  batch_size: 128  # H3
  num_epochs: 50
  num_workers: 4
  pin_memory: true

  optimizer:
    type: "Adam"
    lr: 2.0e-4  # H3
    weight_decay: 2.0e-4  # H3
    betas: [0.9, 0.999]  # H3

  gradient_clip_norm: 1.0  # H3
  dropout_rate: 0.4  # H3

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5  # H3
    patience: 10  # H3
    min_lr: 1.0e-6  # H3

  loss:
    type: "mse"  # H3

# =============================================================================
# VALIDATION & TEST SETTINGS
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING
# =============================================================================

early_stopping:
  enabled: true
  patience: 12  # H3
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"
  mortality_test_threshold_mode: fixed_0_5

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
