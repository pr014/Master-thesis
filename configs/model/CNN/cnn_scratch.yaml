# CNN from scratch — ICU 24h (Studienzeile A2)
# Studienzeile: P2 (data/icu_ecgs_24h/P2, ohne Z-Score), AG2, D1 (keine Tabular-/Zusatzfeatures), H1
# H1 (Studientabelle): Batch 64, Epochen 50, Adam lr 5e-4, wd 1e-4, betas [0.9, 0.999], Dropout 0.3,
#   Grad-Clip 1, ReduceLROnPlateau (factor 0.1, patience 5, min_lr 1e-6), ES patience 7,
#   Val/Test 0.1/0.1, LOS-MSE
# AG2: Gaussian noise noise_std=0.03 (relative zur Signal-Std), Amplitude scaling 85–115 %
# Steuerung: optional config_merge für Base-YAMLs (CLI --base / --experiment).

# Optional: Base- / Experiment-YAML mergen (CLI --base / --experiment überschreibt diese Pfade).
config_merge:
  base_config_path: null      # z. B. configs/icu_24h/output/weighted_intervals.yaml
  experiment_config_path: null

seed: 42

device:
  device: null
  deterministic: false

data:
  data_dir: "data/icu_ecgs_24h/P2"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12

  los_task: "regression"   # regression | classification (setzt intern data.task_type)

  split_strategy: "temporal_stratified"

  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: false  # P2: .npy ohne Z-Score (Vorbearbeitung siehe scripts/preprocessing/preprocessing_baseline.py)

  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: true
    scale_min: 0.85
    scale_max: 1.15
    baseline_wander: false
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    lead_dropout: false
    lead_dropout_prob: 0.1
    time_segment_shuffle: false
    time_segment_shuffle_num_segments: 5
    time_segment_shuffle_p: 0.5
    mortality_balance_time_shuffle:
      enabled: false

  demographic_features:
    enabled: false

  icu_unit_features:
    enabled: false

model:
  type: "CNNScratch"
  num_classes: 10

training:
  batch_size: 64
  num_epochs: 50
  num_workers: 4
  pin_memory: true
  optimizer:
    type: "Adam"
    lr: 5e-4
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  gradient_clip_norm: 1.0
  dropout_rate: 0.3
  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.1
    patience: 5
    min_lr: 1e-6
  loss:
    type: "mse"

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

early_stopping:
  enabled: true
  patience: 7
  monitor: "val_loss"
  mode: "min"

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"
  # Test-Mortalität: feste Schwelle 0.5 (gleiche Logik wie andere Architekturen mit fixed_0_5)
  mortality_test_threshold_mode: fixed_0_5

multi_task:
  enabled: true
  # Wenn enabled: true — admissions_path setzen (Mortalitäts-Labels)
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
