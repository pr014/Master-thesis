# HuBERT-ECG — Small weights (hidden_size=512 laut config.json), H2-Training (AdamW, Warmup, Phasen)
# Wie Job 3730714 (P1, H2, AG4): Daten P1, Augmentation AG4-Subset ohne Amplitude-Scaling
# Tabular wie Hybrid/DeepECG: Demographics + ICU-Unit + SOFA (Late Fusion)
# Phase 1: eingefrorener Backbone, nur Heads (max. Epochen = training.num_epochs)
# Phase 2: unfrozen Transformer, Feature-Extractor bleibt frozen (Skript: max 20 Epochen)

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

seed: 42

device:
  device: null
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12

  los_task: "regression"
  split_strategy: "temporal_stratified"

  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"

  # Wie Hybrid/DeepECG: Gaussian, Lead Drop, Baseline Wander — kein Amplitude-Scaling
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    baseline_wander: true
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    lead_dropout: true
    lead_dropout_prob: 0.1

  demographic_features:
    enabled: true
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"

  icu_unit_features:
    enabled: true
    encoding: "onehot"
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: true
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: true
    normalize: "none"

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "HuBERT_ECG"
  num_classes: 8

  hubert:
    checkpoint_path: "model.safetensors"
    config_path: "config.json"
    hidden_size: 512
    freeze_backbone: true
    gradient_checkpointing: false
    apply_preprocessing: false

  pretrained:
    enabled: true
    cache_dir: "data/pretrained_weights/Hubert_ECG/small"

  feature_dim: 512
  shared_dim: 128

# =============================================================================
# TRAINING (H2: Batch 32, AdamW, Linear warmup 8%, Huber/MSE — hier MSE)
# =============================================================================

training:
  batch_size: 32
  num_epochs: 50
  num_workers: 4
  pin_memory: true

  optimizer:
    type: "AdamW"
    lr: 1.0e-4
    backbone_lr: 1.0e-5
    deep_backbone_lr: 1.0e-7
    weight_decay: 0.01
    betas: [0.9, 0.98]

  gradient_clip_norm: 1.0
  dropout_rate: 0.1

  scheduler:
    type: "LinearScheduleWithWarmup"
    warmup_steps_pct: 0.08

  loss:
    type: "mse"

# =============================================================================
# VALIDATION & TEST
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING (H2: patience 7)
# =============================================================================

early_stopping:
  enabled: true
  patience: 7
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  los_use_weighted_loss: false
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
