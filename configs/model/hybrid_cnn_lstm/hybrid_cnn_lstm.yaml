# Hybrid CNN-LSTM — Studienzeile A5
# P1 / H4 / AG1 / D1 (ein Trainingslauf; Hybrid-Optuna nutzt separates Merge, siehe unten)
# - P1: data/icu_ecgs_24h/P1 + Bandpass/Z-score (preprocessing)
# - D1: ECG-only — keine Demographics, keine ICU-Unit-, keine EHR-/SOFA-/Therapie-Features (alles enabled: false)
# - AG1: nur Gaussian Noise (noise_std 0.03); kein Amplitude Scaling, kein Lead-Drop, kein Baseline-Wander
# - H4: Tabelle H4 — lr 2e-4, Batch 64, wd 2e-4, dropout_rate 0.4, lstm_dropout 0.4, grad_clip 1,
#   ReduceLROnPlateau (factor 0.5, patience 12, min_lr 1e-6), ES patience 7, hidden_dim 128 / layer2 64,
#   Adam betas [0.9, 0.999], LOS-Loss Huber (delta 1.0)
#
# Mortalität Test-Eval: f1_optimal (Val-max-F1 Threshold, auf Test angewandt), siehe training_utils.

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Random seed for reproducibility
seed: 42

# Device settings
device:
  device: null  # null = auto-select (CUDA if available, else CPU)
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0  # Hz
  window_seconds: 10.0  # seconds
  num_leads: 12  # 12-lead ECG
  
  # LOS task type: REGRESSION
  los_task: "regression"  # "regression" or "classification"
  
  # Data splitting strategy (temporal split only)
  split_strategy: "temporal_stratified"
  
  # Preprocessing
  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"
  
  # Augmentation AG1 (siehe Kopfkommentar)
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    lead_dropout: false
    lead_dropout_prob: 0.1
    baseline_wander: false
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    time_segment_shuffle: false
    time_segment_shuffle_num_segments: 5
    time_segment_shuffle_p: 0.5
    mortality_balance_time_shuffle:
      enabled: false
      # optional: feste Anzahl Shuffles pro positivem Fall; weglassen = auto ceil(n_neg/n_pos)-1
      # children_per_positive: 10
  
  demographic_features:
    enabled: false
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"
  
  icu_unit_features:
    enabled: false
    encoding: "onehot"
    # Top-10 first_careunit by ICU stay count (same list as configs/features/icu_unit_features.yaml, DeepECG-SL, LSTM)
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: false
    normalize: "none"

  icu_therapy_support_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/icu_therapy_support.csv"
    columns:
      - mech_vent
      - niv_hfnc
      - vaso_any
      - vaso_non_catechol_any
      - rrt
    filter_to_labeled_only: true

  ehr_window_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/EHR_feature_data.csv"
    exclude_columns:
      - "base_path"
      - "study_id"
      - "subject_id"
      - "ecg_time"
      - "stay_id"
      - "stay_intime"
      - "hadm_id"
      - "t_cut"
    normalize: "zscore"

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "HybridCNNLSTM"
  num_classes: 10  # LOS bin classification: [0,1), [1,2), ..., [9, +inf) = 10 classes
                  # Note: For regression, this is ignored (output_dim = 1)

  # CNN block parameters (default architecture)
  conv1_out: 32
  conv2_out: 64
  conv3_out: 128
  conv1_kernel: 5
  conv2_kernel: 5
  conv3_kernel: 3
  # Padding defaults to kernel//2 for same-length conv

  # LSTM — H4: hidden_dim 128 / hidden_dim_layer2 64 (pro Richtung)
  hidden_dim: 128
  num_layers: 2
  lstm_dropout: 0.4  # H4 (Tabelle)
  bidirectional: true
  hidden_dim_layer2: 64
  
  # Pooling Strategy
  # "mean": Aggregates information across all timesteps (recommended)
  # "last": Only uses last hidden state (discards 99.98% of information)
  # "max": Maximum pooling over time dimension
  # Scientific justification: Lin et al. (2013) demonstrate mean pooling improves LSTM performance
  pooling: "mean"

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  batch_size: 64  # H4
  num_epochs: 50
  num_workers: 4
  pin_memory: true

  optimizer:
    type: "Adam"
    lr: 2.0e-4  # H4
    weight_decay: 2.0e-4  # H4
    betas: [0.9, 0.999]  # H4

  gradient_clip_norm: 1.0  # H4
  dropout_rate: 0.4  # H4 (CNN/Head)

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5  # H4
    patience: 12  # H4
    min_lr: 1.0e-6  # H4

  loss:
    type: "huber"  # H4
    delta: 1.0     # H4 (Huber delta — bitte ggf. anpassen, falls in Tabelle abweichend)

# =============================================================================
# VALIDATION & TEST SETTINGS
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING
# =============================================================================

early_stopping:
  enabled: true
  patience: 7  # H4
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"
  # F1-optimal: Schwelle auf Validierung per max-F1 tunen, dann auf Test anwenden (siehe training_utils).
  mortality_test_threshold_mode: f1_optimal

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
