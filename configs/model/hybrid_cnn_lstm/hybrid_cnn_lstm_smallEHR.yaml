# Hybrid CNN-LSTM — final Optuna configuration
# P1 / AG4 / D6 (EHR-small + ICU + demographics)
# - P1: data/icu_ecgs_24h/P1 + Bandpass/Z-score (preprocessing)
# - D6: EHR-small window features + demographics + ICU unit one-hot
# - AG4: Gaussian noise 3% signal std + Lead dropout p=0.1 + Baseline wander (0.15–0.4 Hz, amp 0.03–0.08)
# - Final HPO values from EHR-small Optuna best trial:
#   lr 0.0017168412691106819, wd 0.000977681110033039,
#   dropout_rate 0.4108984960077258, lstm_dropout 0.4837846095833593,
#   hidden_dim 256 / hidden_dim_layer2 256, AdamW betas [0.9, 0.999], Huber(delta=1.0)
#
# Mortalität Test-Eval: validation max-F1 threshold, siehe training_utils.

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Random seed for reproducibility
seed: 42

# Device settings
device:
  device: null  # null = auto-select (CUDA if available, else CPU)
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0  # Hz
  window_seconds: 10.0  # seconds
  num_leads: 12  # 12-lead ECG
  
  # LOS task type: REGRESSION
  los_task: "regression"  # "regression" or "classification"
  
  # Data splitting strategy (temporal split only)
  split_strategy: "temporal_stratified"
  
  # Preprocessing
  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"
  
  # Augmentation AG4 (siehe Kopfkommentar)
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    lead_dropout: true
    lead_dropout_prob: 0.1
    baseline_wander: true
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    time_segment_shuffle: false
    time_segment_shuffle_num_segments: 5
    time_segment_shuffle_p: 0.5
    mortality_balance_time_shuffle:
      enabled: false
      # optional: feste Anzahl Shuffles pro positivem Fall; weglassen = auto ceil(n_neg/n_pos)-1
      # children_per_positive: 10
  
  demographic_features:
    enabled: true
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"
  
  icu_unit_features:
    enabled: true
    encoding: "onehot"
    # Top-10 first_careunit by ICU stay count (same list as configs/features/icu_unit_features.yaml, DeepECG-SL, LSTM)
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: false
    normalize: "none"

  icu_therapy_support_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/icu_therapy_support.csv"
    columns:
      - mech_vent
      - niv_hfnc
      - vaso_any
      - vaso_non_catechol_any
      - rrt
    filter_to_labeled_only: true

  ehr_window_features:
    enabled: true
    csv_path: "data/labeling/labels_csv/EHR_feature_data_small.csv"
    exclude_columns:
      - "base_path"
      - "study_id"
      - "subject_id"
      - "ecg_time"
      - "stay_id"
      - "stay_intime"
      - "hadm_id"
      - "t_cut"
      - "ehr_window_hours"
    normalize: "zscore"

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "HybridCNNLSTM"
  num_classes: 10  # LOS bin classification: [0,1), [1,2), ..., [9, +inf) = 10 classes
                  # Note: For regression, this is ignored (output_dim = 1)

  # CNN block parameters (default architecture)
  conv1_out: 32
  conv2_out: 64
  conv3_out: 128
  conv1_kernel: 5
  conv2_kernel: 5
  conv3_kernel: 3
  # Padding defaults to kernel//2 for same-length conv

  # LSTM — final Optuna EHR-small best trial: preset 256_256
  hidden_dim: 256
  num_layers: 2
  lstm_dropout: 0.4837846095833593
  bidirectional: true
  hidden_dim_layer2: 256
  
  # Pooling Strategy
  # "mean": Aggregates information across all timesteps (recommended)
  # "last": Only uses last hidden state (discards 99.98% of information)
  # "max": Maximum pooling over time dimension
  # Scientific justification: Lin et al. (2013) demonstrate mean pooling improves LSTM performance
  pooling: "mean"

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  batch_size: 64
  num_epochs: 200
  num_workers: 4
  pin_memory: true

  optimizer:
    type: "AdamW"
    lr: 0.0017168412691106819
    weight_decay: 0.000977681110033039
    betas: [0.9, 0.999]

  gradient_clip_norm: 2.0
  dropout_rate: 0.4108984960077258

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 6
    min_lr: 1.0e-6

  loss:
    type: "huber"
    delta: 1.0

# =============================================================================
# VALIDATION & TEST SETTINGS
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING
# =============================================================================

early_stopping:
  enabled: true
  patience: 15
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"
  # Validation max-F1 threshold, then applied to test.
  mortality_test_threshold_mode: f1_optimal

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null