# DeepECG-SL — Studien-Pipeline: P1 + AG4 + H3 (Feature-Ablation D1–D6 per --experiment-config)
#
# P1: data/icu_ecgs_24h/P1, Bandpass + Z-score (wie bisher)
# AG4: Gaussian noise 3% signal std + Lead dropout p=0.1 + Baseline wander (0.15–0.4 Hz, amp 0.03–0.08)
# H3 (Tabellenzeile): batch 32, Adam lr 5e-4, wd 1e-2, dropout 0.1, grad clip 1,
#   ReduceLROnPlateau factor 0.5 patience 8, min_lr 1e-6, ES patience 15,
#   d_model 768, shared_dim 256, betas [0.9, 0.98], LOS Huber (delta 1.0); Zeile „N/A“ ohne Extra-Parameter
#
# D1–D6: configs/experiments/deepecg_sl/feature_development/d[1-6].yaml
#
# Start (Beispiel D3):
#   python scripts/training/icu_24h/deepecg_sl/train_deepecg_sl_24h.py \
#     --model-config configs/model/deepecg_sl/deepecg_sl_p1_ag4_h3.yaml \
#     --experiment-config configs/experiments/deepecg_sl/feature_development/d3.yaml \
#     --trial-id D3 --sweep-id deepecg_feature_dev

seed: 42

device:
  device: null
  deterministic: false

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12

  los_task: "regression"
  split_strategy: "temporal_stratified"

  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"

  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    baseline_wander: true
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    lead_dropout: true
    lead_dropout_prob: 0.1
    time_segment_shuffle: false
    time_segment_shuffle_num_segments: 5
    time_segment_shuffle_p: 0.5
    mortality_balance_time_shuffle:
      enabled: false

  demographic_features:
    enabled: false
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"

  icu_unit_features:
    enabled: false
    encoding: "onehot"
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: true
    normalize: "none"

  icu_therapy_support_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/icu_therapy_support.csv"
    columns:
      - mech_vent
      - niv_hfnc
      - vaso_any
      - vaso_non_catechol_any
      - rrt
    filter_to_labeled_only: true

  ehr_window_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/EHR_feature_data_small.csv"
    exclude_columns:
      - "study_id"
      - "subject_id"
      - "ecg_time"
      - "stay_id"
      - "stay_intime"
      - "hadm_id"
      - "t_cut"
    normalize: "zscore"

model:
  type: "DeepECG_SL"
  num_classes: 8

  wcr:
    model_name: "wcr_77_classes"
    base_ssl_path: "base_ssl.pt"
    d_model: 768
    freeze_backbone: false

  input_adapter:
    type: "conv1d"
    in_length: 5000
    out_length: 2500
    kernel_size: 3
    stride: 2

  pretrained:
    enabled: true
    cache_dir: "data/pretrained_weights/deepecg_sl"

  feature_dim: 768
  shared_dim: 256

training:
  batch_size: 32
  num_epochs: 50
  num_workers: 4
  pin_memory: true

  optimizer:
    type: "Adam"
    lr: 5.0e-4
    backbone_lr: 5.0e-4
    head_lr: 5.0e-4
    weight_decay: 1.0e-2
    betas: [0.9, 0.98]
    eps: 1.0e-6

  gradient_clip_norm: 1.0
  dropout_rate: 0.1

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 8
    min_lr: 1.0e-6

  loss:
    type: "huber"
    delta: 1.0

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

early_stopping:
  enabled: true
  patience: 15
  monitor: "val_loss"
  mode: "min"

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"
  mortality_test_threshold_mode: f1_optimal   # F1-max threshold (tuned on validation, applied to test)

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
