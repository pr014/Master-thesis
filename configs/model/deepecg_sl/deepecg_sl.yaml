# DeepECG-SL (WCR) - Vollständige Konfiguration
# Features D17: 24h-ICU-ECG (data/icu_ecgs_24h/P1) | Tabular: komplette EHR_feature_data.csv + icu_unit + demographics; SOFA / Therapy aus
# Augmentation AG6: (1) Gaussian 3% of signal std, (2) lead dropout p=0.1/lead,
#   (3) baseline wander 0.15–0.4 Hz, amp 0.03–0.08; kein amplitude scaling
# Kein time-segment-shuffle / mortality_balance_time_shuffle (reines AG6)
# Training H3: Adam lr 5e-4 (backbone+head), batch 32, wd 1e-2, dropout 0.1, clip 1, scheduler factor 0.5 patience 8, min_lr 1e-6, Huber δ=1, betas [0.9,0.98], ES patience 15
# Pretrained: lokale WCR-Gewichte WCR_77_classes (siehe model.wcr.model_name + pretrained.cache_dir)
# WCR = Wav2Vec2 mit CMSC; Based on: https://github.com/HeartWise-AI/DeepECG_Docker

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

seed: 42

device:
  device: null
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12
  
  los_task: "regression"
  split_strategy: "temporal_stratified"
  
  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"
  
  augmentation:
    # AG6 (train only)
    enabled: true
    gaussian_noise: true
    noise_std: 0.03   # fraction of per-lead signal std (≈ „3% of signal std“)
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    baseline_wander: true
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    lead_dropout: true
    lead_dropout_prob: 0.1
    time_segment_shuffle: false
    time_segment_shuffle_num_segments: 5
    time_segment_shuffle_p: 0.5
    mortality_balance_time_shuffle:
      enabled: false
  
  demographic_features:
    enabled: true
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"
  
  icu_unit_features:
    enabled: true
    encoding: "onehot"
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: true
    normalize: "none"

  icu_therapy_support_features:
    enabled: false
    csv_path: "data/labeling/labels_csv/icu_therapy_support.csv"
    columns:
      - mech_vent
      - niv_hfnc
      - vaso_any
      - vaso_non_catechol_any
      - rrt
    filter_to_labeled_only: true

  # Kleine EHR-Tabelle als Late-Fusion-Features; Metadaten/IDs werden ausgeschlossen
  ehr_window_features:
    enabled: true
    csv_path: "data/labeling/labels_csv/EHR_feature_data_small.csv"
    exclude_columns:
      - "study_id"
      - "subject_id"
      - "ecg_time"
      - "stay_id"
      - "stay_intime"
      - "hadm_id"
      - "t_cut"
    normalize: "zscore"   # train-only mean/std; use "none" for raw values

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "DeepECG_SL"
  num_classes: 8  # Will be overridden by los_binning config (exact_days with max_days=7)
  
  # WCR Encoder Configuration
  # Architecture from fairseq-signals:
  # - 4 Conv layers [(256, 2, 2)] for feature extraction
  # - 12 Transformer encoder layers with embed_dim=768
  wcr:
    # Lokaler Pfad: cache_dir/WCR_77_classes.pt + base_ssl.pt ODER cache_dir/WCR_77_classes/base_ssl.pt + Checkpoint-.pt
    model_name: "WCR_77_classes"
    base_ssl_path: "base_ssl.pt"
    d_model: 768                    # Transformer encoder embed dimension (from checkpoint)
    freeze_backbone: false          # Full fine-tuning: gesamtes Modell + Demographics
    
  # Input Adapter Configuration
  # WCR expects (B, 12, 2500) input format
  # Our data is (B, 12, 5000) @ 500Hz, need to downsample to 2500
  input_adapter:
    type: "conv1d"                  # conv1d, linear, or pooling
    in_length: 5000
    out_length: 2500
    kernel_size: 3
    stride: 2
    
  # Pretrained weights (local files only; see WCREncoder resolution in wcr_encoder.py)
  pretrained:
    enabled: true
    cache_dir: "data/pretrained_weights/deepecg_sl"
    
  # Feature dimensions
  feature_dim: 768                  # Output from WCR encoder (encoder_embed_dim)
  shared_dim: 256                   # Shared layer dimension

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  batch_size: 32
  # Phase-2 fine-tuning reads this as max_epochs (see train_deepecg_sl_24h.run_training).
  num_epochs: 30
  num_workers: 4
  pin_memory: true
  
  optimizer:
    type: "Adam"
    lr: 5.0e-4
    backbone_lr: 5.0e-4
    head_lr: 5.0e-4
    weight_decay: 1.0e-2
    betas: [0.9, 0.98]
  
  gradient_clip_norm: 1.0
  dropout_rate: 0.1
  
  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 8
    min_lr: 1e-6
  
  loss:
    type: "huber"
    delta: 1.0
    weighted: false

# =============================================================================
# VALIDATION & TEST SETTINGS
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING
# =============================================================================

early_stopping:
  enabled: true
  patience: 15
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
