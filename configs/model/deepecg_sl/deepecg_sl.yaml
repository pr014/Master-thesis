# DeepECG-SL (WCR) - Vollständige Konfiguration
# Datensatz: icu_ecgs_24h/P1 | Tabular: SOFA + ICU unit + Demographics (wie Hybrid)
# Augmentation: Gaussian noise, lead dropout, baseline wander (kein Amplitude-Scaling)
# Pretrained: lokale WCR-Gewichte WCR_77_classes (siehe model.wcr.model_name + pretrained.cache_dir)
# WCR = Wav2Vec2 mit CMSC; Based on: https://github.com/HeartWise-AI/DeepECG_Docker

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

seed: 42

device:
  device: null
  deterministic: false

# =============================================================================
# DATA SETTINGS
# =============================================================================

data:
  data_dir: "data/icu_ecgs_24h/P1"
  sampling_rate: 500.0
  window_seconds: 10.0
  num_leads: 12
  
  los_task: "regression"
  split_strategy: "temporal_stratified"
  
  preprocessing:
    target_sampling_rate: 500.0
    window_seconds: 10.0
    filter_type: "bandpass"
    filter_lowcut: 0.5
    filter_highcut: 50.0
    filter_order: 4
    normalize: "zscore"
  
  augmentation:
    enabled: true
    gaussian_noise: true
    noise_std: 0.03
    amplitude_scaling: false
    scale_min: 0.85
    scale_max: 1.15
    baseline_wander: true
    bw_freq_min: 0.15
    bw_freq_max: 0.4
    bw_amp_min: 0.03
    bw_amp_max: 0.08
    lead_dropout: true
    lead_dropout_prob: 0.1
  
  demographic_features:
    enabled: true
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    age_normalization: "minmax"
    age_min: 0
    age_max: 120
    sex_encoding: "binary"
    missing_age_strategy: "median"
    missing_sex_strategy: "default"
  
  diagnosis_features:
    enabled: false
    records_csv_path: "data/labeling/labels_csv/records_w_diag_icd10.csv"
    diagnosis_list:
      - I10       # Essential (primary) hypertension
      - E785      # Hyperlipidemia, unspecified
      - I2510     # Atherosclerotic heart disease of native coronary artery without angina pectoris
      - I4891     # Unspecified atrial fibrillation
      - N179      # Acute kidney failure, unspecified
      - I509      # Heart failure, unspecified
      - Z87891    # Personal history of nicotine dependence
      - K219      # Gastro-esophageal reflux disease without esophagitis
      - E872      # Acidosis
      - J9690     # Respiratory failure, unspecified, unspecified whether with hypoxia or hypercapnia
      - D62       # Acute posthemorrhagic anemia
      - E119      # Type 2 diabetes mellitus without complications
      - Z7901     # Long term (current) use of anticoagulants
      - D649      # Anemia, unspecified
      - N390      # Urinary tract infection, site not specified
      - R6521     # Severe sepsis with septic shock
      - Z66       # Do not resuscitate
      - A419      # Sepsis, unspecified organism
      - F329      # Major depressive disorder, single episode, unspecified
      - J189      # Pneumonia, unspecified organism
      - I129      # Hypertensive chronic kidney disease with stage 1 through stage 4 chronic kidney disease, or unspecified chronic kidney disease
      - E871      # Hypo-osmolality and hyponatremia
      - N170      # Acute kidney failure with tubular necrosis
      - Z781      # Physical restraint status
      - E039      # Hypothyroidism, unspecified
    diagnosis_columns:
      - "all_diag_all"
      - "all_diag_hosp"
      - "hosp_diag_hosp"
      - "ed_diag_hosp"
    missing_strategy: "zero"
  
  icu_unit_features:
    enabled: true
    encoding: "onehot"
    icu_unit_list:
      - "Medical Intensive Care Unit (MICU)"
      - "Medical/Surgical Intensive Care Unit (MICU/SICU)"
      - "Cardiac Vascular Intensive Care Unit (CVICU)"
      - "Surgical Intensive Care Unit (SICU)"
      - "Coronary Care Unit (CCU)"
      - "Trauma SICU (TSICU)"
      - "Neuro Intermediate"
      - "Neuro Surgical Intensive Care Unit (Neuro SICU)"
      - "Neuro Stepdown"
      - "Surgery/Vascular/Intermediate"
    unknown_strategy: "other"
    missing_strategy: "most_common"

  sofa_features:
    enabled: true
    csv_path: "data/labeling/labels_csv/sofa_scores.csv"
    columns:
      - sofa_total
    require_available: true
    filter_to_valid_sofa: true
    normalize: "none"

# =============================================================================
# MODEL ARCHITECTURE
# =============================================================================

model:
  type: "DeepECG_SL"
  num_classes: 8  # Will be overridden by los_binning config (exact_days with max_days=7)
  
  # WCR Encoder Configuration
  # Architecture from fairseq-signals:
  # - 4 Conv layers [(256, 2, 2)] for feature extraction
  # - 12 Transformer encoder layers with embed_dim=768
  wcr:
    # Lokaler Pfad: cache_dir/WCR_77_classes.pt + base_ssl.pt ODER cache_dir/WCR_77_classes/base_ssl.pt + Checkpoint-.pt
    model_name: "WCR_77_classes"
    base_ssl_path: "base_ssl.pt"
    d_model: 768                    # Transformer encoder embed dimension (from checkpoint)
    freeze_backbone: false          # Full fine-tuning: gesamtes Modell + Demographics
    
  # Input Adapter Configuration
  # WCR expects (B, 12, 2500) input format
  # Our data is (B, 12, 5000) @ 500Hz, need to downsample to 2500
  input_adapter:
    type: "conv1d"                  # conv1d, linear, or pooling
    in_length: 5000
    out_length: 2500
    kernel_size: 3
    stride: 2
    
  # Pretrained weights (local files only; see WCREncoder resolution in wcr_encoder.py)
  pretrained:
    enabled: true
    cache_dir: "data/pretrained_weights/deepecg_sl"
    
  # Feature dimensions
  feature_dim: 768                  # Output from WCR encoder (encoder_embed_dim)
  shared_dim: 256                   # Shared layer dimension

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  batch_size: 32
  # Phase-2 fine-tuning reads this as max_epochs (see train_deepecg_sl_24h.run_training).
  num_epochs: 30
  num_workers: 4
  pin_memory: true
  
  optimizer:
    type: "Adam"
    lr: 5e-4
    weight_decay: 1e-2
    betas: [0.9, 0.98]
  
  gradient_clip_norm: 1.0
  dropout_rate: 0.1
  
  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 8
    min_lr: 1e-6
  
  loss:
    type: "huber"
    delta: 1.0
    weighted: false

# =============================================================================
# VALIDATION & TEST SETTINGS
# =============================================================================

validation:
  val_split: 0.1
  val_frequency: 1

test_split: 0.1

# =============================================================================
# EARLY STOPPING
# =============================================================================

early_stopping:
  enabled: true
  patience: 15
  monitor: "val_loss"
  mode: "min"

# =============================================================================
# CHECKPOINTING & LOGGING
# =============================================================================

checkpoint:
  save_dir: "outputs/checkpoints"
  save_frequency: 1
  save_best: true
  metric: "val_loss"

logging:
  log_dir: "outputs/logs"
  use_tensorboard: true
  log_frequency: 10

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "median_ae"
    - "accuracy"
    - "auc_roc"

# =============================================================================
# MULTI-TASK LEARNING
# =============================================================================

multi_task:
  enabled: true
  admissions_path: "data/labeling/labels_csv/admissions.csv"
  los_loss_weight: 1.0
  mortality_loss_weight: 1.0
  mortality_use_weighted_loss: false
  mortality_pos_weight: null
